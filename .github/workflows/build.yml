name: Build Jarvis APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug - Show repo contents
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== All files in root ==="
          ls -la
          echo ""
          echo "=== Looking for ZIP files ==="
          find . -maxdepth 1 -name "*.zip" -o -name "*.ZIP"
          echo ""
          echo "=== Check if app folder exists ==="
          ls -ld app 2>/dev/null || echo "No app folder"

      - name: Extract project files
        run: |
          set -e
          
          # Case 1: Files already uploaded individually
          if [ -d "app" ] && [ -f "build.gradle.kts" ]; then
            echo "SUCCESS: Project files already present"
            ls app/
            exit 0
          fi
          
          # Case 2: ZIP file uploaded to repo root
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" -type f | head -1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No project files and no ZIP found!"
            echo ""
            echo "Please do ONE of the following:"
            echo "1. Upload jarvis-android.zip to the repo root, OR"
            echo "2. Upload the extracted files (app/, build.gradle.kts, etc.)"
            exit 1
          fi
          
          echo "Found ZIP: $ZIP_FILE"
          mkdir -p extracted_temp
          unzip "$ZIP_FILE" -d extracted_temp/
          
          echo "=== ZIP contents ==="
          find extracted_temp -maxdepth 2 | head -20
          
          # Try to find the project root inside the ZIP
          if [ -d "extracted_temp/jarvis-android" ]; then
            echo "Moving from extracted_temp/jarvis-android/"
            cp -r extracted_temp/jarvis-android/* . 2>/dev/null || true
            cp -r extracted_temp/jarvis-android/.* . 2>/dev/null || true
          elif [ -d "extracted_temp/app" ]; then
            echo "Moving from extracted_temp/"
            cp -r extracted_temp/* . 2>/dev/null || true
            cp -r extracted_temp/.* . 2>/dev/null || true
          else
            # Search deeper for app folder
            APP_DIR=$(find extracted_temp -type d -name "app" | head -1)
            if [ -n "$APP_DIR" ]; then
              PROJECT_ROOT=$(dirname "$APP_DIR")
              echo "Found project root: $PROJECT_ROOT"
              cp -r "$PROJECT_ROOT"/* . 2>/dev/null || true
              cp -r "$PROJECT_ROOT"/.* . 2>/dev/null || true
            fi
          fi
          
          rm -rf extracted_temp
          
          # Final verification
          if [ -d "app" ] && [ -f "build.gradle.kts" ]; then
            echo "SUCCESS: Project files extracted and ready"
            ls -la
          else
            echo "ERROR: Could not extract project files from ZIP"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache AI Models
        uses: actions/cache@v4
        id: model-cache
        with:
          path: app/src/main/assets/models
          key: jarvis-models-v1

      - name: Download AI Models
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/assets/models
          echo "Downloading Qwen3-0.6B..."
          curl -L -o app/src/main/assets/models/qwen3-0.6b-q4_0.gguf \
            "https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/qwen3-0.6b-q4_0.gguf"
          echo "Downloading Qwen3-1.7B..."
          curl -L -o app/src/main/assets/models/qwen3-1.7b-q4_k_m.gguf \
            "https://huggingface.co/Qwen/Qwen3-1.7B-GGUF/resolve/main/qwen3-1.7b-q4_k_m.gguf"
          echo "Downloading Whisper Tiny..."
          curl -L -o app/src/main/assets/models/ggml-tiny.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin"
          echo "Done downloading models"

      - name: Add llama.cpp and whisper.cpp
        run: |
          cd app/src/main/cpp
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git
          echo "Cloned submodules"

      - name: Enable Native Libraries in CMake
        run: |
          echo "Before sed:"
          cat app/src/main/cpp/CMakeLists.txt
          echo ""
          echo "Running sed..."
          sed -i '/#LLAMA_START/,/#LLAMA_END/s/^# //' app/src/main/cpp/CMakeLists.txt
          sed -i '/#WHISPER_START/,/#WHISPER_END/s/^# //' app/src/main/cpp/CMakeLists.txt
          sed -i '/#LINK_START/,/#LINK_END/s/^# //' app/src/main/cpp/CMakeLists.txt
          echo "After sed:"
          cat app/src/main/cpp/CMakeLists.txt

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
