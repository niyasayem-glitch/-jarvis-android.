name: Build Jarvis APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract project ZIP
        run: |
          # Find and extract the uploaded ZIP
          ZIP_FILE=$(ls *.zip | head -1)
          echo "Found ZIP: $ZIP_FILE"
          unzip "$ZIP_FILE" -d extracted/
          ls -la extracted/

      - name: Move files to root
        run: |
          mv extracted/*/* . 2>/dev/null || mv extracted/* .
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          sdkmanager "ndk;25.2.9519653"
          sdkmanager "cmake;3.22.1"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache AI Models
        uses: actions/cache@v4
        id: model-cache
        with:
          path: app/src/main/assets/models
          key: jarvis-models-v1

      - name: Download AI Models
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/assets/models
          curl -L --progress-bar -o app/src/main/assets/models/qwen3-0.6b-q4_0.gguf \
            "https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/qwen3-0.6b-q4_0.gguf"
          curl -L --progress-bar -o app/src/main/assets/models/qwen3-1.7b-q4_k_m.gguf \
            "https://huggingface.co/Qwen/Qwen3-1.7B-GGUF/resolve/main/qwen3-1.7b-q4_k_m.gguf"
          curl -L --progress-bar -o app/src/main/assets/models/ggml-tiny.bin \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin"

      - name: Add llama.cpp & whisper.cpp
        run: |
          cd app/src/main/cpp
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git

      - name: Enable Native Libraries in CMake
        run: |
          sed -i 's/# add_subdirectory(llama.cpp)/add_subdirectory(llama.cpp)/' app/src/main/cpp/CMakeLists.txt
          sed -i 's/# add_subdirectory(whisper.cpp)/add_subdirectory(whisper.cpp)/' app/src/main/cpp/CMakeLists.txt
          sed -i 's/# target_link_libraries(jarvis llama)/target_link_libraries(jarvis llama)/' app/src/main/cpp/CMakeLists.txt
          sed -i 's/# target_link_libraries(jarvis whisper)/target_link_libraries(jarvis whisper)/' app/src/main/cpp/CMakeLists.txt

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

          
